kind = "web"
previewPath = "/"
title = "Jarida"
version = "1.0.0"
id = "artifacts/jarida"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21921

[services.development]
run = "pnpm --filter @workspace/jarida run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jarida", "run", "build" ]
publicDir = "artifacts/jarida/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21921"
BASE_PATH = "/"
